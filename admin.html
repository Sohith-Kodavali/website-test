<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin CMS · RRK Food Court</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css?v=7" />
<script>(function(){try{var d=localStorage.getItem('rrk_dark');if(d==='1'||(d===null&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark-mode');}}catch(e){}})();</script>
<style>
  .cms-body{min-height:100vh;background:var(--bg)}
  .cms-header{background:var(--grad-red);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
  .cms-header h2{font-size:20px}.cms-header h2 span{opacity:.7}
  .cms-nav{display:flex;flex-wrap:wrap;gap:6px;padding:14px 24px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .cms-tab{white-space:nowrap;border:1px solid var(--border);background:none;border-radius:8px;padding:8px 16px;font-family:'Sora';font-size:13px;font-weight:600;cursor:pointer;transition:.2s;color:var(--muted)}
  .cms-tab:hover,.cms-tab.active{background:var(--grad-red);color:#fff;border-color:transparent}
  .cms-main{padding:24px}
  .cms-panel{background:#fff;border:1px solid var(--border);border-radius:var(--r-card);padding:24px;box-shadow:var(--sh-card);max-width:900px;margin:0 auto}
  .cms-list{display:flex;flex-direction:column;gap:10px}
  .cms-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .cms-cat-btn{border:1.5px solid var(--border);background:#fff;border-radius:999px;padding:7px 14px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted)}
  .cms-cat-btn:hover,.cms-cat-btn.active{background:var(--grad-red);color:#fff;border-color:transparent}
  .cms-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border:1px solid var(--border);border-radius:14px;background:#fafaf7;flex-wrap:wrap;gap:10px}
  .cms-item-info{display:flex;align-items:center;gap:12px}
  .cms-item-info span{display:block;font-size:12px;color:var(--muted)}
  .cms-item-img{width:48px;height:48px;border-radius:10px;object-fit:cover;border:1px solid var(--border)}
  .admin-field{margin-bottom:14px}
  .admin-field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .admin-field input,.admin-field textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;background:#fff}
  .admin-field textarea{resize:vertical}
  .admin-field input:focus,.admin-field textarea:focus{outline:none;border-color:var(--gold)}
  .admin-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:16px}
  .admin-modal__card{background:#fff;border-radius:var(--r-card);padding:28px;width:min(100%,480px);max-height:90vh;overflow-y:auto;box-shadow:var(--sh-float)}
  .admin-modal__card h3{margin-bottom:16px}
  .admin-login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
  .admin-login-card{width:100%;max-width:400px;background:#fff;border:1px solid var(--border);border-radius:var(--r-card);padding:36px 28px;box-shadow:var(--sh-card);text-align:center}
  .admin-login-card h2{font-size:28px;margin-bottom:6px}
  .admin-login-card input{margin-bottom:12px}
  @media(max-width:600px){.cms-nav{gap:4px;padding:10px 16px}.cms-tab{padding:6px 12px;font-size:11px}.cms-main{padding:16px}.cms-panel{padding:16px}}
  @media(min-width:1024px){body.admin-body,body.admin-body *{cursor:auto !important}body.admin-body a,body.admin-body button,body.admin-body .cms-tab,body.admin-body input,body.admin-body textarea,body.admin-body select{cursor:pointer !important}}
</style>
</head>
<body class="admin-body">

<!-- LOGIN SCREEN -->
<div class="admin-login-page" id="adminLoginPage">
  <div class="admin-login-card">
    <h2>RRK Admin</h2>
    <p class="muted" style="margin-bottom:24px">Content Management System</p>
    <form onsubmit="handleAdminLogin(event)">
      <input type="password" id="adminPass" placeholder="Password" required class="admin-field-input" style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;margin-bottom:16px" autocomplete="current-password" />
      <button type="submit" class="btn btn--primary btn--block btn--lg">Login</button>
    </form>
    <p id="adminLoginError" style="color:var(--red);font-size:13px;margin-top:12px;display:none">Invalid credentials</p>
  </div>
</div>

<!-- CMS DASHBOARD -->
<div class="cms-body" id="adminDashboard" style="display:none">
  <header class="cms-header">
    <h2>RRK <span>Admin CMS</span></h2>
    <div style="display:flex;align-items:center;gap:10px">
      <button id="btnExportFirestore" class="btn btn--gold-outline" style="padding:8px 16px;font-size:12px;color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.1)" onclick="exportFirestoreData()">📥 Export Data</button>
      <button class="btn btn--gold-outline" style="padding:8px 16px;font-size:12px;color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.1)" onclick="seedAdminData()">🌱 Seed Default Data</button>
      <button class="btn btn--gold-outline" style="padding:8px 16px;font-size:12px;color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.1)" onclick="logoutAdmin()">Logout</button>
    </div>
  </header>
  <nav class="cms-nav">
    <button class="cms-tab active" data-tab="menu" onclick="showTab('menu')">Menu</button>
    <button class="cms-tab" data-tab="craft" onclick="showTab('craft')">Craft My Plate</button>
    <button class="cms-tab" data-tab="raw" onclick="showTab('raw')">Raw Chicken</button>
    <button class="cms-tab" data-tab="orders" onclick="showTab('orders')">Orders</button>
    <button class="cms-tab" data-tab="occasions" onclick="showTab('occasions')">Occasions</button>
    <button class="cms-tab" data-tab="customers" onclick="showTab('customers')">Customers</button>
    <button class="cms-tab" data-tab="contact" onclick="showTab('contact')">Contact</button>
    <button class="cms-tab" data-tab="social" onclick="showTab('social')">Social / Footer</button>
    <button class="cms-tab" data-tab="settings" onclick="showTab('settings')">Settings</button>
  </nav>
  <main class="cms-main">
    <div class="cms-panel" id="cms-menu"></div>
    <div class="cms-panel" id="cms-craft" style="display:none"></div>
    <div class="cms-panel" id="cms-raw" style="display:none"></div>
    <div class="cms-panel" id="cms-orders" style="display:none"></div>
    <div class="cms-panel" id="cms-occasions" style="display:none"></div>
    <div class="cms-panel" id="cms-customers" style="display:none"></div>
    <div class="cms-panel" id="cms-contact" style="display:none"></div>
    <div class="cms-panel" id="cms-social" style="display:none"></div>
    <div class="cms-panel" id="cms-settings" style="display:none"></div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=6"></script>
<script src="js/firebase.js?v=7"></script>
<script src="js/site-renderer.js?v=7"></script>
<script src="js/admin.js?v=6"></script>
<script>
function handleAdminLogin(e) {
  e.preventDefault();
  adminHaptic('click');
  var p = document.getElementById('adminPass').value.trim();
  var defaultPass = 'admin1234';
  var expectedPass = null;
  function checkLogin() {
    var err = document.getElementById('adminLoginError');
    // Try hashed comparison first, fall back to plaintext for legacy passwords
    hashPassword(p).then(function(hashed) {
      if (hashed === expectedPass || p === expectedPass || (!expectedPass && p === defaultPass)) {
        // Auto-migrate: if password is still plaintext (<64 chars), hash and save it
        if (expectedPass && expectedPass.length < 60 && typeof rrkSettings !== 'undefined') {
          hashPassword(expectedPass).then(function(h) {
            rrkSettings.save({ admin_pass: h }).catch(function(){});
          });
        }
        sessionStorage.setItem(ADMIN_KEY, '1');
        showAdminDashboard();
      } else {
        err.style.display = 'block';
      }
    }).catch(function() {
      // If hashing fails, fall back to plaintext
      if (p === expectedPass || (!expectedPass && p === defaultPass)) {
        sessionStorage.setItem(ADMIN_KEY, '1');
        showAdminDashboard();
      } else {
        err.style.display = 'block';
      }
    });
  }
  if (typeof rrkSettings === 'undefined') {
    checkLogin();
    return;
  }
  rrkSettings.get().then(function(s) {
    if (s.admin_pass) expectedPass = s.admin_pass;
    checkLogin();
  }).catch(function() {
    checkLogin();
  });
}

function hashPassword(pw) {
  if (typeof crypto === 'undefined' || !crypto.subtle) return Promise.resolve(pw);
  var encoder = new TextEncoder();
  return crypto.subtle.digest('SHA-256', encoder.encode(pw)).then(function(buf) {
    return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }).catch(function() { return pw; });
}

function showAdminDashboard() {
  document.getElementById('adminLoginPage').style.display = 'none';
  document.getElementById('adminDashboard').style.display = 'block';
  loadAdminApp();
}

function logoutAdmin() {
  adminHaptic('close');
  if (typeof stopOrdersPolling === 'function') stopOrdersPolling();
  sessionStorage.removeItem(ADMIN_KEY);
  location.reload();
}

if (sessionStorage.getItem(ADMIN_KEY)) {
  showAdminDashboard();
}

function exportFirestoreData() {
  adminHaptic('click');
  if (!confirm('Export all Firestore data? This will download a JSON file with all 8 collections.')) return;

  var collections = ['settings','categories','customers','menu','raw','occasions','orders'];
  var apis = {
    settings: window.rrkSettings,
    categories: window.rrkCategories,
    customers: window.rrkCustomers,
    menu: window.rrkMenu,
    raw: window.rrkRaw,
    occasions: window.rrkOccasions,
    orders: window.rrkOrders
  };

  var result = { exportedAt: new Date().toISOString(), projectId: 'rrk-test', collections: {} };
  var btn = document.getElementById('btnExportFirestore');
  var origText = btn.textContent;
  btn.textContent = '⏳ Exporting...';
  btn.disabled = true;

  function fetchNext(i) {
    if (i >= collections.length) {
      var blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'rrk-firestore-export.json';
      a.click();
      URL.revokeObjectURL(a.href);
      btn.textContent = origText;
      btn.disabled = false;
      adminHaptic('confirm');
      alert('Export complete! Downloaded rrk-firestore-export.json');
      return;
    }
    var name = collections[i];
    var api = apis[name];
    btn.textContent = '⏳ ' + name + '...';

    var promise;
    if (name === 'settings') {
      // settings.get() returns key-value object; convert back to array of {key,value} docs
      promise = api.get().then(function(obj) {
        return Object.keys(obj).map(function(k) { return { key: k, value: obj[k] }; });
      });
    } else {
      promise = api.list();
    }

    promise.then(function(docs) {
      result.collections[name] = docs;
      fetchNext(i + 1);
    }).catch(function(err) {
      console.error('Export failed for ' + name + ':', err);
      btn.textContent = origText;
      btn.disabled = false;
      alert('Export failed on collection: ' + name + '. See console for details.');
    });
  }

  fetchNext(0);
}
</script>
</body></html>
